<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trip Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,300;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg:         #0c0b14;
      --surface:    #13121e;
      --card:       #1b1929;
      --card-hover: #201e30;
      --accent:     #e8a838;
      --accent-dim: rgba(232,168,56,0.12);
      --accent-glow:rgba(232,168,56,0.25);
      --coral:      #e05c5c;
      --text:       #f4f0e8;
      --text-muted: #8a879e;
      --border:     rgba(232,168,56,0.14);
      --border-dim: rgba(255,255,255,0.06);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 2.5rem 1.5rem 4rem;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(232,168,56,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(224,92,92,0.04) 0%, transparent 60%);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }
    .app-shell { max-width: 1040px; margin: 0 auto; display: grid; gap: 2.5rem; }

    /* HEADER */
    header { text-align: center; padding: 1rem 0 0.5rem; }
    header h1 {
      margin: 0;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 7vw, 5.5rem);
      font-weight: 600;
      letter-spacing: 0.04em;
      line-height: 1;
    }
    header h1 span { color: var(--accent); font-style: italic; }
    .header-rule { display: flex; align-items: center; justify-content: center; gap: 1rem; margin: 0.85rem 0 1rem; }
    .header-rule::before, .header-rule::after { content: ''; width: 60px; height: 1px; background: linear-gradient(90deg, transparent, var(--accent)); }
    .header-rule::after { background: linear-gradient(90deg, var(--accent), transparent); }
    .header-rule-diamond { width: 6px; height: 6px; background: var(--accent); transform: rotate(45deg); }
    header p { margin: 0 auto; max-width: 560px; color: var(--text-muted); font-size: 0.95rem; font-weight: 300; letter-spacing: 0.02em; }

    /* SUMMARY BAR */
    .planner-summary {
      display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between;
      gap: 1rem; padding: 1.1rem 1.5rem;
      background: var(--accent-dim); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 1.75rem;
    }
    .planner-summary p { margin: 0; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.05rem; color: var(--accent); }
    .stats-row { display: flex; gap: 1.5rem; font-size: 0.82rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
    .stats-row span strong { color: var(--text); font-weight: 700; }

    /* CARDS */
    .planner-card, .trip-list, .todo-list {
      background: var(--surface); border: 1px solid var(--border-dim); border-radius: 20px; padding: 2rem;
    }
    .section-label { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); margin: 0 0 1.5rem; }

    /* FORM */
    .planner-form { display: grid; gap: 1.25rem; }
    label { display: grid; gap: 0.5rem; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
    input, textarea {
      background: var(--card); border: 1px solid var(--border-dim); border-radius: 10px;
      padding: 0.85rem 1rem; font: 400 0.95rem/1.4 'DM Sans', sans-serif; color: var(--text); width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder, textarea::placeholder { color: var(--text-muted); opacity: 0.6; }
    input:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6) sepia(1) saturate(3) hue-rotate(5deg); cursor: pointer; }
    textarea { min-height: 96px; resize: vertical; }

    /* BUTTONS */
    button {
      border: none; border-radius: 10px; cursor: pointer;
      font: 700 0.85rem/1 'DM Sans', sans-serif; letter-spacing: 0.1em; text-transform: uppercase;
      transition: transform 0.18s, box-shadow 0.18s, opacity 0.18s, background 0.18s;
    }
    button:focus { outline: 2px solid var(--accent); outline-offset: 3px; }
    .add-button { background: var(--accent); color: #0c0b14; padding: 0.95rem 1.75rem; align-self: end; }
    .add-button:disabled { opacity: 0.3; cursor: not-allowed; }
    .add-button:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--accent-glow); }

    /* TRIP LIST */
    .trip-list-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 1.5rem; }
    .trip-list-header h2 { margin: 0; font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-weight: 600; }
    .trip-count-badge { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.15rem; }
    .empty-state::before { content: '✦'; display: block; font-size: 1.5rem; color: var(--accent); margin-bottom: 0.75rem; font-style: normal; }
    .trip-grid { display: grid; gap: 1rem; }

    /* TRIP CARD */
    @keyframes slideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .trip-card {
      background: var(--card); border: 1px solid var(--border-dim); border-radius: 14px; padding: 1.4rem 1.5rem;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      animation: slideIn 0.35s ease both;
    }
    .trip-card:hover { background: var(--card-hover); border-color: var(--border); transform: translateY(-2px); }
    .trip-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; }
    .trip-card h3 { margin: 0 0 0.35rem; font-family: 'Cormorant Garamond', serif; font-size: 1.35rem; font-weight: 600; line-height: 1.2; }
    .trip-dates { display: flex; align-items: center; gap: 0.5rem; font-size: 0.82rem; color: var(--text-muted); flex-wrap: wrap; }
    .trip-dates .arrow { color: var(--accent); font-size: 0.7rem; }
    .trip-duration {
      display: inline-block; padding: 0.15rem 0.5rem;
      background: var(--accent-dim); border: 1px solid var(--border); border-radius: 999px;
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em; color: var(--accent); text-transform: uppercase;
    }
    .trip-notes { margin: 1rem 0 0; padding-top: 1rem; border-top: 1px solid var(--border-dim); font-size: 0.88rem; color: var(--text-muted); line-height: 1.65; }
    .trip-card-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
    .remove-button { background: transparent; border: 1px solid rgba(224,92,92,0.25); color: var(--coral); border-radius: 8px; padding: 0.45rem 0.8rem; }
    .remove-button:hover { background: rgba(224,92,92,0.1); border-color: var(--coral); }
    .download-button { background: transparent; border: 1px solid var(--border); color: var(--text-muted); border-radius: 8px; padding: 0.45rem 0.8rem; }
    .download-button:hover { border-color: var(--accent); color: var(--accent); }

    /* TODO */
    .todo-list h2 { margin: 0 0 1.25rem; font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-weight: 600; }
    .todo-form { display: flex; gap: 0.75rem; margin-bottom: 1.25rem; }
    .todo-form input { flex: 1; }
    .todo-form .add-button { white-space: nowrap; }
    .todo-count { font-size: 0.78rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin: 0 0 0.75rem; }
    .todo-items { list-style: none; padding: 0; margin: 0; display: grid; gap: 0.5rem; }
    .todo-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.85rem 1rem; border: 1px solid var(--border-dim); border-radius: 10px; background: var(--card);
      transition: border-color 0.2s;
    }
    .todo-item:hover { border-color: var(--border); }
    .todo-item span { flex: 1; font-size: 0.92rem; }
    .todo-item.done span { text-decoration: line-through; color: var(--text-muted); }
    .todo-item input[type="checkbox"] { width: 1.1rem; height: 1.1rem; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }

    /* RESPONSIVE */
    @media (min-width: 900px) {
      .planner-card, .trip-list, .todo-list { padding: 2.5rem; }
      .planner-form { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      label:nth-child(4) { grid-column: span 2; }
      .trip-grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    function formatDate(iso) {
      return new Date(iso + 'T00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function getDuration(start, end) {
      const days = Math.round((new Date(end + 'T00:00') - new Date(start + 'T00:00')) / 86400000) + 1;
      return days === 1 ? '1 day' : `${days} days`;
    }

    function App() {
      const [destination, setDestination] = useState('');
      const [startDate, setStartDate] = useState('');
      const [endDate, setEndDate] = useState('');
      const [notes, setNotes] = useState('');
      const [trips, setTrips] = useState([]);
      const [todoText, setTodoText] = useState('');
      const [todos, setTodos] = useState([]);

      const canAdd = destination.trim() !== '' && startDate !== '' && endDate !== '';
      const upcomingTrips = trips.filter(t => new Date(t.startDate) >= new Date()).length;

      const addTrip = () => {
        if (!canAdd) return;
        setTrips(current => [{ id: crypto.randomUUID(), destination: destination.trim(), startDate, endDate, notes: notes.trim() }, ...current]);
        setDestination(''); setStartDate(''); setEndDate(''); setNotes('');
      };

      const removeTrip = (id) => setTrips(current => current.filter(t => t.id !== id));

      const addTodo = () => {
        if (!todoText.trim()) return;
        setTodos(current => [{ id: crypto.randomUUID(), text: todoText.trim(), done: false }, ...current]);
        setTodoText('');
      };

      const toggleTodo = (id) => setTodos(current => current.map(t => t.id === id ? { ...t, done: !t.done } : t));
      const removeTodo = (id) => setTodos(current => current.filter(t => t.id !== id));

      const downloadItinerary = (trip) => {
        const content = [
          '============================',
          '        TRIP ITINERARY',
          '============================',
          '',
          `Destination : ${trip.destination}`,
          `Start Date  : ${new Date(trip.startDate + 'T00:00').toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}`,
          `End Date    : ${new Date(trip.endDate + 'T00:00').toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}`,
          `Duration    : ${getDuration(trip.startDate, trip.endDate)}`,
          '',
          trip.notes ? `Notes:\n${trip.notes}` : '',
          '',
          '============================',
          `Downloaded on ${new Date().toLocaleDateString()}`,
        ].join('\n');
        const blob = new Blob([content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${trip.destination.replace(/\s+/g, '_')}_itinerary.txt`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const summary = useMemo(() => {
        if (trips.length === 0) return 'Where will you go next?';
        const upcoming = trips.filter(t => new Date(t.startDate) >= new Date()).sort((a, b) => a.startDate.localeCompare(b.startDate));
        if (upcoming.length === 0) return 'All trips are in the past — time to plan a new one.';
        return `Next: ${upcoming[0].destination}, departing ${formatDate(upcoming[0].startDate)}`;
      }, [trips]);

      return (
        <div className="app-shell">
          <header>
            <h1>Trip <span>Planner</span></h1>
            <div className="header-rule"><div className="header-rule-diamond" /></div>
            <p>Plan trips, track dates, and save notes for every getaway.</p>
          </header>

          <section className="planner-card">
            <div className="planner-summary">
              <p>{summary}</p>
              <div className="stats-row">
                <span><strong>{trips.length}</strong> total</span>
                <span><strong>{upcomingTrips}</strong> upcoming</span>
              </div>
            </div>
            <p className="section-label">New destination</p>
            <div className="planner-form">
              <label>Destination<input value={destination} onChange={e => setDestination(e.target.value)} placeholder="City, country or region" /></label>
              <label>Start date<input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} /></label>
              <label>End date<input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} /></label>
              <label>Notes<textarea value={notes} onChange={e => setNotes(e.target.value)} placeholder="Packing list, reservations, reminders…" /></label>
              <button type="button" className="add-button" disabled={!canAdd} onClick={addTrip}>Add trip</button>
            </div>
          </section>

          <section className="trip-list">
            <div className="trip-list-header">
              <h2>Your trips</h2>
              {trips.length > 0 && <span className="trip-count-badge">{trips.length} saved</span>}
            </div>
            {trips.length === 0 ? (
              <p className="empty-state">No trips saved yet.</p>
            ) : (
              <div className="trip-grid">
                {trips.map((trip, i) => (
                  <article className="trip-card" key={trip.id} style={{ animationDelay: `${i * 60}ms` }}>
                    <div className="trip-card-header">
                      <div>
                        <h3>{trip.destination}</h3>
                        <p className="trip-dates">
                          {formatDate(trip.startDate)}
                          <span className="arrow">▶</span>
                          {formatDate(trip.endDate)}
                          <span className="trip-duration">{getDuration(trip.startDate, trip.endDate)}</span>
                        </p>
                      </div>
                      <div className="trip-card-actions">
                        <button className="download-button" onClick={() => downloadItinerary(trip)}>Download</button>
                        <button className="remove-button" onClick={() => removeTrip(trip.id)}>Remove</button>
                      </div>
                    </div>
                    {trip.notes && <p className="trip-notes">{trip.notes}</p>}
                  </article>
                ))}
              </div>
            )}
          </section>

          <section className="todo-list">
            <h2>To-do</h2>
            <div className="todo-form">
              <input value={todoText} onChange={e => setTodoText(e.target.value)} onKeyDown={e => e.key === 'Enter' && addTodo()} placeholder="Add a task…" />
              <button type="button" className="add-button" disabled={!todoText.trim()} onClick={addTodo}>Add</button>
            </div>
            {todos.length === 0 ? (
              <p className="empty-state">No tasks yet.</p>
            ) : (
              <>
                <p className="todo-count">{todos.filter(t => t.done).length} / {todos.length} completed</p>
                <ul className="todo-items">
                  {todos.map(todo => (
                    <li key={todo.id} className={`todo-item${todo.done ? ' done' : ''}`}>
                      <input type="checkbox" checked={todo.done} onChange={() => toggleTodo(todo.id)} />
                      <span>{todo.text}</span>
                      <button className="remove-button" onClick={() => removeTodo(todo.id)}>Remove</button>
                    </li>
                  ))}
                </ul>
              </>
            )}
          </section>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
